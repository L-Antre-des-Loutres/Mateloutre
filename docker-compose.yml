services:
  mateloutre:
    image: mateloutre:latest
    container_name: bot_discord-mateloutre
    restart: unless-stopped
    ports:
      - "9502:3000"
    env_file:
      - .env
    volumes:
      - ./channels.json:/app/channels.json
      - ./otterlyApiRoutes.json:/app/otterlyApiRoutes.json
      - cache_data:/app/cache
    networks:
      - pocketbase_network

networks:
  pocketbase_network:
    external: true

volumes:
  cache_data:
